# Build recipe consumed by https://github.com/dayo05/kei after each push.
# Plain Kotlin/JVM library: build the jars, publish to the kei Maven repo,
# and publish the editor API setup archive for aris block writer.

[[steps]]
name = "build"
command = "./gradlew"
args = ["build"]

[[steps]]
name = "package-api-setup"
command = "bash"
args = [
  "-c",
  "set -e; ARCHIVER=\"$(command -v 7z || command -v 7za || command -v 7zr || true)\"; test -n \"$ARCHIVER\" || { echo '7z, 7za, or 7zr is required' >&2; exit 1; }; rm -rf build/api-setup build/aris-luagen-api-setup.7z build/aris-luagen-api-setup.7z.sha256; mkdir -p build/api-setup/apis; found_api=false; for file in build/generated/ksp/main/resources/apis/*.json; do test -f \"$file\" || continue; cp \"$file\" build/api-setup/apis/; found_api=true; done; test \"$found_api\" = true || { echo 'No generated API schema found under build/generated/ksp/main/resources/apis' >&2; exit 1; }; cp -R apis/i18n build/api-setup/apis/; (cd build/api-setup && \"$ARCHIVER\" a -t7z ../aris-luagen-api-setup.7z apis); if command -v sha256sum >/dev/null 2>&1; then CHECKSUM=\"$(sha256sum build/aris-luagen-api-setup.7z)\"; else CHECKSUM=\"$(shasum -a 256 build/aris-luagen-api-setup.7z)\"; fi; printf '%s\\n' \"${CHECKSUM%% *}\" > build/aris-luagen-api-setup.7z.sha256",
]

[[steps]]
name = "publish-maven"
command = "bash"
args = [
  "-c",
  "./gradlew publishToMavenLocal -Dmaven.repo.local=\"${KEI_MAVEN_REPO:-$HOME/.m2/repository}\"",
]

# Pick up the library jars + the annotation-processor subproject's jars.
# `suffix = ""` flattens to the build's artifact root keeping the source
# filenames (e.g. aris.luagen-1.0-SNAPSHOT.jar, ap-1.0-SNAPSHOT.jar).
[[artifacts]]
pattern = "build/libs/*.jar"
suffix = ""

[[artifacts]]
pattern = "ap/build/libs/*.jar"
suffix = ""

[[artifacts]]
pattern = "build/aris-luagen-api-setup.7z"
suffix = ""

[[artifacts]]
pattern = "build/aris-luagen-api-setup.7z.sha256"
suffix = ""

[[artifacts]]
pattern = "READMe.md"
suffix = ""
